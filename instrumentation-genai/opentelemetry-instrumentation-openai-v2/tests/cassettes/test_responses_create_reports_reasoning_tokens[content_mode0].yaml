                  "text": "```bash\n#!/usr/bin/env bash\n\n# Usage:\n#   ./transpose.sh '[1,2],[3,4],[5,6]'\n\ninput=\"$1\"\n\n# Extract rows into an array\nIFS='|' read -r -a rows <<< \"$(echo \"$input\" | sed 's/],\\[/]|[/g')\"\n\n# Remove leading/trailing brackets and split first row to get column count\nfirst_row=\"${rows[0]#[}\"\nfirst_row=\"${first_row%]}\"\nIFS=',' read -r -a first_vals <<< \"$first_row\"\ncols=\"${#first_vals[@]}\"\n\n# Build transpose\nresult=\"\"\nfor ((c=0; c<cols; c++)); do\n    transposed_row=\"\"\n    for row in \"${rows[@]}\"; do\n        row=\"${row#[}\"\n        row=\"${row%]}\"\n        IFS=',' read -r -a vals <<< \"$row\"\n        transposed_row+=\"${vals[c]},\"\n    done\n    transposed_row=\"[${transposed_row%,}]\"\n    result+=\"$transposed_row,\"\ndone\n\n# Remove trailing comma and print\necho \"${result%,}\"\n```\n\nExample:\n```bash\n$ ./transpose.sh '[1,2],[3,4],[5,6]'\n[1,3,5],[2,4,6]\n```"
